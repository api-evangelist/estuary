aid: estuary
url: https://raw.githubusercontent.com/api-evangelist/estuary/refs/heads/main/apis.yml
name: Estuary
kind: company
description: Estuary builds Estuary Flow, a real-time data movement platform for
  streaming ETL and change data capture (CDC). Flow captures data from databases,
  warehouses, and SaaS systems into durable collections and materializes those
  collections back out to destinations. The Flow control plane exposes a
  Supabase/PostgREST-based REST API (Bearer refresh/access tokens) covering
  captures, materializations, collections, catalog drafts and publications,
  connectors, and tenants/billing, while the data plane is driven declaratively
  via the flowctl CLI and a Gitops model.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Data Integration
- Streaming ETL
- Change Data Capture
- CDC
- Real-Time Data
- Data Pipelines
created: '2026-07-01'
modified: '2026-07-01'
specificationVersion: '0.19'
